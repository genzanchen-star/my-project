<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子租賃合約 - 安心管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/lz-string@1.5.0/libs/lz-string.min.js'"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cream: #F9F7F4;
            --light-gray: #E8E5E1;
            --warm-gray: #A39B93;
            --dark-gray: #4A4A4A;
            --wood: #C9A87C;
            --wood-dark: #B39368;
        }
        body { font-family: 'Noto Sans TC', Arial, sans-serif; background: var(--cream); color: var(--dark-gray); line-height: 1.8; }

        /* Header */
        header { background: white; padding: 14px 24px; border-bottom: 1px solid var(--light-gray); display: flex; align-items: center; gap: 12px; }
        header img { height: 48px; }
        header h1 { font-size: 17px; font-weight: 500; }

        /* Steps */
        .steps { display: flex; justify-content: center; align-items: center; padding: 24px 16px; }
        .step { display: flex; align-items: center; }
        .step-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--light-gray); color: var(--warm-gray); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; transition: all 0.3s; }
        .step.active .step-circle { background: var(--wood); color: white; }
        .step.done .step-circle { background: #5cb85c; color: white; }
        .step-label { font-size: 13px; margin-left: 8px; color: var(--warm-gray); transition: all 0.3s; }
        .step.active .step-label { color: var(--dark-gray); font-weight: 500; }
        .step-line { width: 50px; height: 1px; background: var(--light-gray); margin: 0 10px; }

        /* Container / Card */
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 48px; }
        .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { font-size: 17px; font-weight: 600; margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid var(--light-gray); }

        /* Form */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; color: var(--warm-gray); margin-bottom: 6px; font-weight: 500; }
        label .req { color: #e74c3c; margin-left: 2px; }
        input, select { border: 1px solid var(--light-gray); border-radius: 8px; padding: 10px 14px; font-size: 15px; font-family: inherit; color: var(--dark-gray); transition: border-color 0.2s; background: white; }
        input:focus, select:focus { outline: none; border-color: var(--wood); }

        /* Buttons */
        .btn { padding: 11px 26px; border-radius: 8px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--wood); color: white; }
        .btn-primary:hover { background: var(--wood-dark); }
        .btn-secondary { background: transparent; color: var(--warm-gray); border: 1px solid var(--light-gray); }
        .btn-secondary:hover { border-color: var(--warm-gray); color: var(--dark-gray); }
        .btn-green { background: #5cb85c; color: white; }
        .btn-green:hover { background: #4cae4c; }
        .btn-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; flex-wrap: wrap; }

        /* Signature */
        .sig-wrap { border: 1.5px dashed var(--light-gray); border-radius: 10px; background: #fafafa; position: relative; overflow: hidden; }
        .sig-wrap canvas { display: block; width: 100%; cursor: crosshair; touch-action: none; }
        .sig-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ccc; font-size: 14px; pointer-events: none; white-space: nowrap; }
        .clear-sig { font-size: 13px; color: var(--warm-gray); background: none; border: none; cursor: pointer; padding: 6px 2px; text-decoration: underline; margin-top: 4px; }

        /* Contract Preview */
        .contract-preview { font-size: 14px; line-height: 2; }
        .contract-preview h2 { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: 2px; }
        .contract-preview .subtitle { text-align: center; font-size: 13px; color: var(--warm-gray); margin-bottom: 24px; }
        .contract-preview .article { margin-bottom: 14px; }
        .hl { background: #fff8e1; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
        .parties { display: flex; gap: 32px; margin-bottom: 20px; }
        .party-box { flex: 1; border: 1px solid var(--light-gray); border-radius: 8px; padding: 12px 16px; font-size: 13px; }
        .party-box .party-title { font-weight: 600; color: var(--wood-dark); margin-bottom: 4px; }
        .sig-row { display: flex; gap: 32px; margin-top: 32px; }
        .sig-col { flex: 1; text-align: center; }
        .sig-col .sig-label { font-size: 13px; color: var(--warm-gray); margin-bottom: 8px; }
        .sig-col img.sig-img { max-height: 70px; display: block; margin: 0 auto 4px; }
        .sig-line { border-top: 1px solid var(--dark-gray); padding-top: 6px; font-size: 13px; }
        .checklist-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
        .checklist-table th { background: #f5f5f5; border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
        .checklist-table td { border: 1px solid #ddd; padding: 8px 10px; }

        /* Share box */
        .share-box { background: #f0f9f0; border: 1px solid #c3e6c3; border-radius: 10px; padding: 20px; margin-top: 24px; }
        .share-box h3 { font-size: 15px; font-weight: 600; color: #2d7a2d; margin-bottom: 8px; }
        .share-box p { font-size: 13px; color: #3a7a3a; margin-bottom: 12px; }
        .share-url { display: flex; gap: 8px; }
        .share-url input { flex: 1; font-size: 12px; padding: 8px 10px; border-radius: 6px; border: 1px solid #c3e6c3; background: white; color: var(--dark-gray); }
        .share-url button { padding: 8px 16px; font-size: 13px; }

        /* Checklist Editor */
        .checklist-editor { margin-top: 8px; }
        .checklist-editor table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .checklist-editor th { background: #f5f5f5; border: 1px solid var(--light-gray); padding: 8px 10px; font-weight: 500; font-size: 13px; color: var(--warm-gray); }
        .checklist-editor td { border: 1px solid var(--light-gray); padding: 4px 6px; }
        .checklist-editor input, .checklist-editor select { border: none; padding: 6px 8px; font-size: 14px; font-family: inherit; background: transparent; width: 100%; color: var(--dark-gray); }
        .checklist-editor input:focus, .checklist-editor select:focus { outline: 1px solid var(--wood); border-radius: 4px; }
        .del-row { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 4px 8px; line-height: 1; }
        .del-row:hover { color: #e74c3c; }
        .add-row-btn { margin-top: 8px; font-size: 13px; color: var(--wood); background: none; border: 1px dashed var(--wood); border-radius: 6px; padding: 6px 14px; cursor: pointer; }
        .add-row-btn:hover { background: #fff8f0; }

        /* Stamp upload */
        .stamp-upload-area { border: 1.5px dashed var(--light-gray); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
        .stamp-upload-area:hover { border-color: var(--wood); }
        .stamp-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .stamp-preview { max-height: 80px; margin: 8px auto 0; display: block; }
        .stamp-hint { font-size: 13px; color: var(--warm-gray); }

        /* Tenant mode banner */
        .tenant-banner { background: #e8f4fd; border-bottom: 1px solid #b8d9f0; padding: 12px 24px; font-size: 14px; color: #1a6fa0; text-align: center; }
        .tenant-banner strong { font-weight: 600; }

        /* Print */
        @media print {
            header, .steps, .btn-actions, .card-title, #printActions,
            .share-box, .tenant-banner, #tenantSigSection, .no-print { display: none !important; }
            body { background: white; font-size: 12pt; }
            .card { box-shadow: none; padding: 0; border-radius: 0; }
            .container { padding: 0; max-width: 100%; }
            .contract-preview { font-size: 11pt; line-height: 1.8; }
            .article { margin-bottom: 10px; }
            .parties { gap: 16px; }
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .card { padding: 20px 16px; }
            .step-label { display: none; }
            .step-line { width: 30px; margin: 0 6px; }
            .parties { flex-direction: column; gap: 12px; }
            .sig-row { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="安心管家">
    <h1>電子租賃合約系統</h1>
</header>

<!-- ========== 出租人模式 ========== -->
<div id="landlordMode">
    <div class="steps">
        <div class="step active" id="si1">
            <div class="step-circle">1</div>
            <span class="step-label">合約資料</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="si2">
            <div class="step-circle">2</div>
            <span class="step-label">承租人資料</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="si3">
            <div class="step-circle">3</div>
            <span class="step-label">確認發送</span>
        </div>
    </div>

    <div class="container">

        <!-- 步驟一：合約資料 -->
        <div id="sc1" class="card">
            <div class="card-title">步驟一：填寫合約資料（出租人填寫）</div>

            <div class="form-row">
                <div class="form-group">
                    <label>出租人姓名 <span class="req">*</span></label>
                    <input type="text" id="landlordName" placeholder="請輸入出租人姓名">
                </div>
                <div class="form-group">
                    <label>房號 <span class="req">*</span></label>
                    <input type="text" id="roomNumber" placeholder="例：101、A棟201">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>出租物件地址 <span class="req">*</span></label>
                    <input type="text" id="landlordAddress" placeholder="請輸入完整地址">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>月租金（元）<span class="req">*</span></label>
                    <input type="number" id="monthlyRent" value="6000" min="0">
                </div>
                <div class="form-group">
                    <label>押金（元）<span class="req">*</span></label>
                    <input type="number" id="deposit" placeholder="例：12000" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>起始電度（度）</label>
                    <input type="number" id="startElec" placeholder="0" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>租期起日 <span class="req">*</span></label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>租期迄日 <span class="req">*</span></label>
                    <input type="date" id="endDate">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>附加設備說明（顯示於合約第一條）</label>
                    <input type="text" id="equipment" placeholder="電視一部、雙門冰箱一台、冷氣一部、衣櫃一個">
                </div>
            </div>

            <div style="margin-top: 24px;">
                <label style="display:block; font-size:13px; color:var(--warm-gray); font-weight:500; margin-bottom:8px;">出租人印章（上傳後將隨連結傳送給承租人）</label>
                <div class="stamp-upload-area" id="stampArea">
                    <input type="file" id="stampFile" accept="image/png,image/jpeg" onchange="loadStamp(this)">
                    <div id="stampHintArea">
                        <div style="font-size:24px; color:var(--light-gray);">🔏</div>
                        <div class="stamp-hint">點擊上傳印章圖片（PNG / JPG）</div>
                    </div>
                    <img id="stampPreview" class="stamp-preview" style="display:none;" alt="印章預覽">
                    <button type="button" id="stampClear" style="display:none; margin-top:6px; font-size:12px; color:var(--warm-gray); background:none; border:none; cursor:pointer; text-decoration:underline;" onclick="clearStamp(event)">移除印章</button>
                </div>
            </div>

            <div style="margin-top: 24px;">
                <label style="display:block; font-size:13px; color:var(--warm-gray); font-weight:500; margin-bottom:8px;">入退房清點表項目</label>
                <div class="checklist-editor">
                    <table id="checklistTable">
                        <thead>
                            <tr>
                                <th style="width:90px">類別</th>
                                <th>項目名稱</th>
                                <th style="width:60px">數量</th>
                                <th style="width:70px">單位</th>
                                <th style="width:36px"></th>
                            </tr>
                        </thead>
                        <tbody id="checklistBody"></tbody>
                    </table>
                    <button type="button" class="add-row-btn" onclick="addCheckRow()">＋ 新增項目</button>
                </div>
            </div>

            <div class="btn-actions">
                <button class="btn btn-primary" onclick="toStep2()">下一步：填寫承租人資料 →</button>
            </div>
        </div>

        <!-- 步驟二：承租人基本資料 -->
        <div id="sc2" class="card" style="display:none">
            <div class="card-title">步驟二：填寫承租人基本資料</div>

            <div class="form-row">
                <div class="form-group">
                    <label>承租人姓名 <span class="req">*</span></label>
                    <input type="text" id="tenantName" placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label>身分證號碼 <span class="req">*</span></label>
                    <input type="text" id="tenantId" placeholder="A123456789">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>手機號碼 <span class="req">*</span></label>
                    <input type="tel" id="tenantPhone" placeholder="0912345678">
                </div>
                <div class="form-group">
                    <label>戶籍住址</label>
                    <input type="text" id="tenantAddress" placeholder="請輸入戶籍地址">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>緊急聯絡人 <span class="req">*</span></label>
                    <input type="text" id="emergencyName" placeholder="緊急聯絡人姓名">
                </div>
                <div class="form-group">
                    <label>緊急聯絡電話 <span class="req">*</span></label>
                    <input type="tel" id="emergencyPhone" placeholder="0912345678">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>與承租人關係</label>
                    <input type="text" id="emergencyRel" placeholder="例：父母、配偶、朋友">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>承租人 Email <span class="req">*</span>（合約將自動寄送至此信箱）</label>
                    <input type="email" id="tenantEmail" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="btn-actions">
                <button class="btn btn-secondary" onclick="showStep(1)">← 上一步</button>
                <button class="btn btn-primary" onclick="toStep3()">下一步：預覽確認 →</button>
            </div>
        </div>

        <!-- 步驟三：預覽確認 + 產生連結 -->
        <div id="sc3" style="display:none">
            <div class="card" id="previewCard">
                <div class="card-title">步驟三：確認合約內容，產生承租人簽署連結</div>
                <div id="previewContent" class="contract-preview"></div>
            </div>

            <div class="share-box" id="shareBox" style="display:none">
                <h3>✅ 連結已產生</h3>
                <p>請將以下連結透過 LINE 傳送給承租人，承租人點開連結即可閱讀合約並完成線上簽名。</p>
                <div class="share-url">
                    <input type="text" id="shareUrl" readonly>
                    <button class="btn btn-green" onclick="copyLink()">複製連結</button>
                </div>
            </div>

            <div class="btn-actions no-print" id="printActions">
                <button class="btn btn-secondary" onclick="showStep(2)">← 返回修改</button>
                <button class="btn btn-primary" id="generateBtn" onclick="generateLink()">產生承租人簽署連結 →</button>
            </div>
        </div>

    </div>
</div>

<!-- ========== 承租人簽署模式 ========== -->
<div id="tenantMode" style="display:none">
    <div class="tenant-banner">
        <strong>承租人簽署頁面</strong>｜請仔細閱讀以下合約內容，確認無誤後在下方完成簽名
    </div>

    <div class="container" style="padding-top: 24px;">
        <div class="card">
            <div id="tenantContractContent" class="contract-preview"></div>

            <div id="tenantSigSection" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--light-gray);">
                <label style="display:block; font-size:14px; font-weight:600; margin-bottom:10px; color:var(--dark-gray);">
                    承租人簽名 <span class="req">*</span>
                </label>
                <div class="sig-wrap">
                    <canvas id="tenantSigCanvas" height="160"></canvas>
                    <span class="sig-hint" id="tenantSigHint">請在此區域手寫簽名</span>
                </div>
                <button class="clear-sig" onclick="clearTenantSig()">✕ 清除重簽</button>

                <div class="btn-actions" style="margin-top: 20px;">
                    <button class="btn btn-green" style="font-size:16px; padding:14px 32px;" onclick="completeSigning()">
                        ✓ 確認簽署並寄送合約
                    </button>
                </div>
            </div>

            <div id="sigSuccessMsg" style="display:none; margin-top:24px; background:#f0f9f0; border:1px solid #c3e6c3; border-radius:10px; padding:24px; text-align:center;">
                <div style="font-size:40px; margin-bottom:12px;">✅</div>
                <h3 style="font-size:18px; color:#2d7a2d; margin-bottom:8px;">簽署完成！</h3>
                <p style="font-size:14px; color:#3a7a3a;">合約已自動寄送至雙方信箱，請確認收件匣（包含垃圾信件夾）。</p>
            </div>
        </div>
    </div>
</div>

<script>
const AGENT = { name: '陳俊仁', phone: '0936625601', email: 'goodcaring2010@gmail.com' };
const EJS = { service: 'service_k6etv1l', template: 'template_3x4j3h6', key: 'tx3vIwADoQyRhQvY5' };

// ===== 印章 =====
let stampDataUrl = '';
function loadStamp(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            // 壓縮：最大60px，JPEG 15%品質（縮到幾百bytes，不影響網址長度）
            const MAX = 60;
            const scale = Math.min(MAX / img.width, MAX / img.height, 1);
            const cv = document.createElement('canvas');
            cv.width  = Math.round(img.width  * scale);
            cv.height = Math.round(img.height * scale);
            cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
            stampDataUrl = cv.toDataURL('image/jpeg', 0.15);
            document.getElementById('stampPreview').src = stampDataUrl;
            document.getElementById('stampPreview').style.display = 'block';
            document.getElementById('stampHintArea').style.display = 'none';
            document.getElementById('stampClear').style.display = 'inline-block';
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
}
function clearStamp(e) {
    e.stopPropagation();
    stampDataUrl = '';
    document.getElementById('stampFile').value = '';
    document.getElementById('stampPreview').style.display = 'none';
    document.getElementById('stampHintArea').style.display = 'block';
    document.getElementById('stampClear').style.display = 'none';
}

// ===== 清點表 =====
const DEFAULT_ITEMS = [
    ['傢俱','衣櫃','1','個'],['傢俱','書桌','1','張'],['傢俱','椅子','1','張'],
    ['傢俱','床組','1','張'],['傢俱','床墊','1','張'],
    ['電器','電視','1','台'],['電器','冷氣','1','部'],['電器','冰箱','1','台'],
    ['水電','馬桶','1','個'],['水電','洗手台','1','個'],['水電','水龍頭','1','組'],
    ['水電','蓮蓬頭','1','組'],['其他','鑰匙','1','支']
];
const CATS = ['傢俱','電器','水電','其他'];

function addCheckRow(cat='其他', name='', qty='1', unit='個') {
    const tb = document.getElementById('checklistBody');
    const tr = document.createElement('tr');
    const catOpts = CATS.map(c => `<option${c===cat?' selected':''}>${c}</option>`).join('');
    tr.innerHTML = `
        <td><select>${catOpts}</select></td>
        <td><input type="text" value="${name}" placeholder="項目名稱"></td>

// ===== 承租人簽名畫布 =====
let tenantCanvas, tenantCtx, tenantDrawing = false, tenantHasSig = false;

function initTenantCanvas() {
    tenantCanvas = document.getElementById('tenantSigCanvas');
    tenantCtx = tenantCanvas.getContext('2d');
    const ratio = window.devicePixelRatio || 1;
    const w = tenantCanvas.parentElement.clientWidth;
    tenantCanvas.width = w * ratio;
    tenantCanvas.height = 160 * ratio;
    tenantCanvas.style.width = w + 'px';
    tenantCanvas.style.height = '160px';
    tenantCtx.scale(ratio, ratio);
    // 填白底（避免 JPEG 輸出時透明變黑）
    tenantCtx.fillStyle = '#ffffff';
    tenantCtx.fillRect(0, 0, tenantCanvas.width, tenantCanvas.height);
    tenantCtx.strokeStyle = '#1a1a1a';
    tenantCtx.lineWidth = 2;
    tenantCtx.lineCap = 'round';
    tenantCtx.lineJoin = 'round';

    function getXY(e) {
        const r = tenantCanvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
    }
    tenantCanvas.addEventListener('mousedown', e => { tenantDrawing = true; const p = getXY(e); tenantCtx.beginPath(); tenantCtx.moveTo(p.x, p.y); });
    tenantCanvas.addEventListener('mousemove', e => { if (!tenantDrawing) return; const p = getXY(e); tenantCtx.lineTo(p.x, p.y); tenantCtx.stroke(); markTenantSig(); });
    tenantCanvas.addEventListener('mouseup', () => tenantDrawing = false);
    tenantCanvas.addEventListener('mouseleave', () => tenantDrawing = false);
    tenantCanvas.addEventListener('touchstart', e => { e.preventDefault(); tenantDrawing = true; const p = getXY(e); tenantCtx.beginPath(); tenantCtx.moveTo(p.x, p.y); }, { passive: false });
    tenantCanvas.addEventListener('touchmove', e => { e.preventDefault(); if (!tenantDrawing) return; const p = getXY(e); tenantCtx.lineTo(p.x, p.y); tenantCtx.stroke(); markTenantSig(); }, { passive: false });
    tenantCanvas.addEventListener('touchend', () => tenantDrawing = false);
}

function markTenantSig() { tenantHasSig = true; document.getElementById('tenantSigHint').style.display = 'none'; }
function clearTenantSig() {
    if (!tenantCtx) return;
    tenantCtx.clearRect(0, 0, tenantCanvas.width, tenantCanvas.height);
    tenantCtx.fillStyle = '#ffffff';
    tenantCtx.fillRect(0, 0, tenantCanvas.width, tenantCanvas.height);
    tenantHasSig = false;
    document.getElementById('tenantSigHint').style.display = 'block';
}

// ===== 步驟控制（出租人模式）=====
function showStep(n) {
    [1,2,3].forEach(i => {
        document.getElementById('sc'+i).style.display = i===n ? 'block' : 'none';
        const el = document.getElementById('si'+i);
        el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
        el.querySelector('.step-circle').textContent = i < n ? '✓' : i;
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

    const laddr = document.getElementById('landlordAddress').value.trim();
    const room  = document.getElementById('roomNumber').value.trim();
    const rent  = document.getElementById('monthlyRent').value;
    const dep   = document.getElementById('deposit').value;
    const s     = document.getElementById('startDate').value;
    const e     = document.getElementById('endDate').value;

// ===== 日期格式 =====
function roc(str) {
    if (!str) return '　　年　月　日';
    const d = new Date(str);
    return `${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日`;
}
function today() {
    const d = new Date();
    return `${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日`;
}
function num(n) { return Number(n).toLocaleString(); }

// ===== 產生承租人簽署連結（lz-string 壓縮）=====
async function generateLink() {
    if (typeof LZString === 'undefined') {
        alert('壓縮套件尚未載入，請重新整理頁面後再試');
        return;
    }
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = '產生連結中，請稍候...';

    const data = collectLandlordData();
    let shortUrl = '';
    try {
        const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(data));
        const longUrl = location.origin + location.pathname + '?d=' + compressed;

        // 呼叫短網址 API（is.gd，支援 CORS，免費免登入）
        try {
            const resp = await fetch(
                'https://is.gd/create.php?format=json&url=' + encodeURIComponent(longUrl),
                { signal: AbortSignal.timeout(8000) }
            );
            const json = await resp.json();
            if (json.shorturl) {
                shortUrl = json.shorturl;
            } else {
                // is.gd 失敗，改用 TinyURL
                try {
                    const r2 = await fetch(
                        'https://tinyurl.com/api-create.php?url=' + encodeURIComponent(longUrl),
                        { signal: AbortSignal.timeout(8000) }
                    );
                    const text = await r2.text();
                    shortUrl = text.startsWith('http') ? text.trim() : longUrl;
                } catch(e2) { shortUrl = longUrl; }
            }
        } catch(apiErr) {
            console.warn('短網址 API 失敗，使用原始連結：', apiErr);
            shortUrl = longUrl;
        }

        document.getElementById('shareUrl').value = shortUrl;
        document.getElementById('shareBox').style.display = 'block';
        document.getElementById('shareBox').scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch(e) {
        alert('連結產生失敗：' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '產生承租人簽署連結 →';
    }
}

function copyLink() {
    const url = document.getElementById('shareUrl').value;
    navigator.clipboard.writeText(url).then(() => {
        alert('連結已複製！請透過 LINE 傳送給承租人');
    }).catch(() => {
        document.getElementById('shareUrl').select();
        document.execCommand('copy');
        alert('連結已複製！請透過 LINE 傳送給承租人');
    });
}

    document.getElementById('landlordMode').style.display = 'none';

    try {
        const data = JSON.parse(LZString.decompressFromEncodedURIComponent(compressed));

        setTimeout(initTenantCanvas, 200);

    btn.textContent = '產生 PDF 中，請稍候...';

    const sigDataUrl = tenantCanvas.toDataURL('image/jpeg', 0.6);
    const sigHtml = `<img class="sig-img" src="${sigDataUrl}" alt="簽名">`;
    const f = window._tenantData;

    // 將簽名寫入合約顯示
    document.getElementById('tenantContractContent').innerHTML = contractHTML(f, sigHtml);
    document.getElementById('tenantSigSection').style.display = 'none';

    // ── 產生 PDF ──
    try {
        const contractEl = document.getElementById('tenantContractContent');
        const canvas = await html2canvas(contractEl, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false
        });

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const margin = 10;
        const imgW = pageW - margin * 2;
        const scale = imgW / (canvas.width / 2); // canvas was rendered @2x
        const totalH = (canvas.height / 2) * scale;
        const pageContentH = pageH - margin * 2;

        let yOffset = 0;
        let page = 0;
        while (yOffset < totalH) {
            if (page > 0) pdf.addPage();
            // slice source canvas pixels for this page
            const srcY = (yOffset / scale) * 2;           // back to @2x pixels
            const srcH = Math.min((pageContentH / scale) * 2, canvas.height - srcY);
            const sliceCanvas = document.createElement('canvas');
            sliceCanvas.width  = canvas.width;
            sliceCanvas.height = srcH;
            sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
            const sliceImg = sliceCanvas.toDataURL('image/jpeg', 0.92);
            const sliceH = srcH / 2 * scale;              // mm height on page
            pdf.addImage(sliceImg, 'JPEG', margin, margin, imgW, sliceH);
            yOffset += pageContentH;
            page++;
        }

        const filename = `租賃合約_${f.room}號房_${f.name}.pdf`;
        pdf.save(filename);
    } catch(pdfErr) {
        console.warn('PDF 產生失敗：', pdfErr);
    }

    // ── 寄送 Email ──
    btn.textContent = '寄送 Email 中，請稍候...';
    const emailBody = `
        <div style="font-family:Arial,sans-serif;max-width:800px;margin:auto;padding:20px;">
            ${contractHTML(f, sigHtml)}
        </div>`;
    const subject = `房屋租賃合約書 - ${f.room}號房 - ${f.name}`;

    try {
        await emailjs.send(EJS.service, EJS.template, {
            to_email: f.tenantEmail,
            subject:  subject,
            message:  emailBody
        });
        await emailjs.send(EJS.service, EJS.template, {
            to_email: AGENT.email,
            subject:  subject + '（出租人存檔）',
            message:  emailBody
        });
        document.getElementById('sigSuccessMsg').style.display = 'block';
    } catch(e) {
        alert('Email 寄送失敗：' + e.message + '\n請截圖合約後手動傳送。');
        btn.disabled = false;
        btn.textContent = '確認簽署並寄送合約';
        document.getElementById('tenantSigSection').style.display = 'block';
    }
}

// ===== 頁面載入 =====
window.addEventListener('load', () => {
    emailjs.init(EJS.key);
    const params = new URLSearchParams(location.search);
    const compressed = params.get('d');
    if (compressed) {
        loadTenantMode(compressed);
    } else {
        DEFAULT_ITEMS.forEach(([cat,name,qty,unit]) => addCheckRow(cat,name,qty,unit));
    }
});
</script>
</body>
</html>
